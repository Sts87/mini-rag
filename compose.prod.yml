services:
  mini-rag:
    image: mini-rag:latest
    container_name: mini-rag
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      build-index:
        condition: service_completed_successfully
    volumes:
      - /opt/mini-rag/data/vectorstore:/app/data/vectorstore:z
      - /opt/mini-rag/data/logs:/app/data/logs:z
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD", "python", "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  build-index:
    image: mini-rag:latest
    container_name: mini-rag-build-index
    env_file:
      - .env
    volumes:
      - /opt/mini-rag/data/documents:/app/data/documents:ro,z
      - /opt/mini-rag/data/vectorstore:/app/data/vectorstore:z
    command: ["python", "src/scripts/build_index.py"]